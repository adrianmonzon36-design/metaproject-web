<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaProject | Requerimientos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --apple-bg: #F5F5F7; --apple-card: #FFFFFF; }
        * { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--apple-bg); color: #1D1D1F; margin: 0; overflow-x: hidden; }

        /* Estilos Globales Extraídos (Se mantienen aquí para proteger la UI mientras no tengamos un archivo CSS externo) */
        .sidebar { width: 260px; height: 100vh; position: fixed; background: rgba(255,255,255,0.8); backdrop-filter: saturate(180%) blur(20px); border-right: 1px solid rgba(0,0,0,0.08); z-index: 100; transform: translateX(-100%); transition: transform 0.3s ease; }
        @media (min-width: 1024px) { .sidebar { transform: translateX(0); } .main-content { margin-left: 260px; } }
        .sidebar.active { transform: translateX(0); }
        .apple-dropdown { position: absolute; top: 100%; right: 0; margin-top: 8px; background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); width: 180px; opacity: 0; visibility: hidden; z-index: 200; transition: all 0.2s ease; }
        .apple-dropdown.active { opacity: 1; visibility: visible; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1200; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 600px; border-radius: 28px; max-height: 90vh; overflow-y: auto; padding: 32px; position: relative; }

        /* Estilos específicos de Requerimientos */
        .apple-card { background: var(--apple-card); border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); transition: all 0.2s; }
        .prio-critica { background: #FF3B30; color: white; }
        .prio-alta { background: #FF9500; color: white; }
        .prio-media { background: #007AFF; color: white; }
        .prio-baja { background: #8E8E93; color: white; }
        .drawer { position: fixed; top: 0; right: -100%; width: 100%; max-width: 550px; height: 100vh; background: white; z-index: 1100; box-shadow: -10px 0 40px rgba(0,0,0,0.1); transition: right 0.3s ease; display: flex; flex-direction: column; }
        .drawer.active { right: 0; }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; z-index: 1050; }
        .drawer-overlay.active { display: block; }
        textarea { resize: none; overflow: hidden; }
        .f-btn.active { background: #000 !important; color: #fff !important; }
        #mentionPopup { position: absolute; background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); width: 240px; max-height: 200px; overflow-y: auto; z-index: 9999; display: none; }
        #mentionPopup.active { display: block; }
        .dropzone { border: 2px dashed #D1D1D6; background: #F5F5F7; transition: all 0.3s ease; }
        .dropzone.dragover { border-color: #007AFF; background: #E5F1FF; }
    </style>
</head>
<body>

    <script src="core.js"></script>

    <div id="mentionPopup"></div>

    <div id="deleteModalReq" class="modal-overlay">
        <div class="modal-content max-w-xs text-center p-8">
            <button onclick="closeModal('deleteModalReq')" class="absolute top-4 right-4 text-gray-400 hover:text-black"><i data-lucide="x" class="w-5 h-5"></i></button>
            <div class="w-12 h-12 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="alert-triangle"></i></div>
            <h3 class="text-lg font-bold mb-2">¿Estás seguro?</h3>
            <p class="text-xs text-gray-500 mb-8 font-medium">Esta acción no se puede deshacer.</p>
            <div class="flex flex-col gap-2">
                <button id="confirmDeleteReqBtn" class="w-full bg-red-500 text-white py-3 rounded-xl text-xs font-bold transition active:scale-95">Continuar</button>
                <button onclick="closeModal('deleteModalReq')" class="w-full py-3 rounded-xl text-xs font-bold text-gray-500 hover:bg-gray-100 transition">Descartar</button>
            </div>
        </div>
    </div>

    <div id="editCommentModal" class="modal-overlay">
        <div class="modal-content relative">
            <button onclick="closeModal('editCommentModal')" class="absolute top-6 right-6 text-gray-400 hover:text-black transition"><i data-lucide="x" class="w-5 h-5"></i></button>
            <h2 class="text-2xl font-bold mb-6 tracking-tight">Editar Comentario</h2>
            <input type="hidden" id="editCommentId">
            <div class="space-y-4">
                <textarea id="editCommentText" oninput="autoExpand(this)" class="w-full bg-gray-50 p-4 rounded-xl border-none outline-none focus:ring-1 focus:ring-gray-200 mt-1 text-sm min-h-[120px]"></textarea>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('editCommentModal')" class="px-6 py-2 rounded-full text-xs font-bold text-gray-400 hover:bg-gray-50 transition">Cancelar</button>
                <button onclick="saveCommentEdit()" class="bg-black text-white px-8 py-2.5 rounded-full text-xs font-bold shadow-lg transition active:scale-95">Guardar</button>
            </div>
        </div>
    </div>

    <div id="deleteCommentModal" class="modal-overlay">
        <div class="modal-content max-w-xs text-center p-8 relative">
            <button onclick="closeModal('deleteCommentModal')" class="absolute top-4 right-4 text-gray-400 hover:text-black transition"><i data-lucide="x" class="w-4 h-4"></i></button>
            <input type="hidden" id="deleteCommentId">
            <div class="w-12 h-12 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="trash-2"></i></div>
            <h3 class="text-lg font-bold mb-2">¿Eliminar comentario?</h3>
            <p class="text-xs text-gray-500 mb-8 font-medium">Esta acción eliminará tu comentario permanentemente.</p>
            <div class="flex flex-col gap-2">
                <button onclick="confirmDeleteCommentAction()" class="w-full bg-red-500 text-white py-3 rounded-xl text-xs font-bold transition active:scale-95">Eliminar</button>
                <button onclick="closeModal('deleteCommentModal')" class="w-full py-3 rounded-xl text-xs font-bold text-gray-500 hover:bg-gray-100 transition">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="drawerOverlay" class="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="sideDrawer" class="drawer">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-white sticky top-0 z-10">
            <h2 id="drawerTitle" class="text-xl font-bold tracking-tight">Título</h2>
            <button onclick="closeDrawer()" class="text-gray-400 hover:text-black transition"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div id="drawerContent" class="flex-1 overflow-y-auto p-6"></div>
        <div id="drawerFooter" class="p-6 border-t border-gray-100 bg-gray-50/50"></div>
    </div>

    <main class="main-content">
        <div class="p-6 lg:p-10 max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-end gap-4 mb-10">
                <div>
                    <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-2">Módulo de Gestión</h2>
                    <h1 class="text-3xl font-bold tracking-tight">Requerimientos</h1>
                </div>
                <button id="btnNewReq" onclick="openDrawer('create')" class="bg-black text-white px-6 py-3 rounded-full text-xs font-bold shadow-xl flex items-center gap-2 transition active:scale-95">
                    <i data-lucide="plus" class="w-4 h-4"></i> Nuevo Requerimiento
                </button>
            </div>

            <div class="flex gap-2 mb-10 overflow-x-auto pb-2" id="filterContainer">
                <button onclick="filterBy('todos')" class="f-btn active px-6 py-2 rounded-full text-[11px] font-bold bg-white border border-gray-100 transition">Todos</button>
                <button onclick="filterBy('critica')" class="f-btn px-6 py-2 rounded-full text-[11px] font-bold bg-white border border-gray-100 transition">Críticos</button>
                <button onclick="filterBy('alta')" class="f-btn px-6 py-2 rounded-full text-[11px] font-bold bg-white border border-gray-100 transition">Altos</button>
                <button onclick="filterBy('media')" class="f-btn px-6 py-2 rounded-full text-[11px] font-bold bg-white border border-gray-100 transition">Medios</button>
                <button onclick="filterBy('baja')" class="f-btn px-6 py-2 rounded-full text-[11px] font-bold bg-white border border-gray-100 transition">Bajos</button>
            </div>

            <div id="reqGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-xs text-gray-400 animate-pulse col-span-full">Cargando requerimientos...</p>
            </div>
        </div>
    </main>

    <script>
        let targetDeleteId = null; let activeViewId = null; let reqsData = []; let currentFilter = 'todos'; 
        let activeMentionInput = null; let currentFiles = [];

        // --- ARRANQUE PRINCIPAL ---
        async function runRequirements() {
            const isLogged = await initCore(); 
            if(isLogged) {
                if(userRole === 'Lector') document.getElementById('btnNewReq')?.classList.add('hidden');
                lucide.createIcons();
                fetchRequirements();
            }
        }

        // --- MENCIONES Y AUTOCOMPLETADO ---
        async function processMentions(text, locationType) {
            const mentions = [];
            allUsers.forEach(u => { if (u.id !== currentUser.id && text.includes(`@${u.full_name}`)) { mentions.push({ user_id: u.id, title: currentUserName, message: `te mencionó en un ${locationType}.` }); } });
            if (mentions.length > 0) await _supabase.from('notifications').insert(mentions);
        }

        function handleInputMention(e) {
            const input = e.target; const val = input.value; const cursor = input.selectionStart;
            const textBeforeCursor = val.substring(0, cursor); const lastAtSignIndex = textBeforeCursor.lastIndexOf('@');
            if (lastAtSignIndex !== -1) { const textAfterAt = textBeforeCursor.substring(lastAtSignIndex + 1); if (!textAfterAt.includes(' ')) { activeMentionInput = input; showMentionPopup(input, textAfterAt.toLowerCase()); return; } }
            hideMentionPopup();
        }

        function showMentionPopup(input, query) {
            const popup = document.getElementById('mentionPopup');
            const matches = allUsers.filter(u => u.full_name.toLowerCase().includes(query) && u.id !== currentUser.id);
            if (matches.length === 0) { hideMentionPopup(); return; }
            popup.innerHTML = matches.map(u => `<div class="px-4 py-3 border-b border-gray-50 hover:bg-gray-50 cursor-pointer flex items-center gap-3 transition" onclick="selectMention('${u.full_name}')"><div class="w-6 h-6 bg-black rounded-full text-white text-[8px] font-bold flex items-center justify-center shrink-0">${u.full_name.substring(0,2).toUpperCase()}</div><span class="text-xs font-bold text-gray-800">${u.full_name}</span></div>`).join('');
            const rect = input.getBoundingClientRect(); popup.style.top = (rect.bottom + window.scrollY + 5) + 'px'; popup.style.left = rect.left + 'px'; popup.style.width = Math.min(rect.width, 300) + 'px'; popup.classList.add('active');
        }

        function selectMention(fullName) {
            if (!activeMentionInput) return;
            const val = activeMentionInput.value; const cursor = activeMentionInput.selectionStart;
            const textBeforeCursor = val.substring(0, cursor); const textAfterCursor = val.substring(cursor);
            const lastAtSignIndex = textBeforeCursor.lastIndexOf('@'); const newTextBeforeCursor = textBeforeCursor.substring(0, lastAtSignIndex) + `@${fullName} `;
            activeMentionInput.value = newTextBeforeCursor + textAfterCursor; activeMentionInput.focus();
            activeMentionInput.selectionStart = activeMentionInput.selectionEnd = newTextBeforeCursor.length; hideMentionPopup(); autoExpand(activeMentionInput);
        }

        function hideMentionPopup() { const popup = document.getElementById('mentionPopup'); if (popup) popup.classList.remove('active'); activeMentionInput = null; }
        function highlightMentions(text) { let formatted = text; allUsers.forEach(u => { const regex = new RegExp(`@${u.full_name}`, 'g'); formatted = formatted.replace(regex, `<span class="text-blue-500 font-bold bg-blue-50 px-1 rounded">@${u.full_name}</span>`); }); return formatted; }

        // --- CARGA DE REQUERIMIENTOS ---
        async function fetchRequirements() {
            const { data, error } = await _supabase.from('requirements').select('*, profiles!created_by(full_name), requirement_comments(*, profiles(full_name))').order('created_at', { ascending: false });
            if (!error) { reqsData = data || []; if(activeViewId && document.getElementById('sideDrawer').classList.contains('active')) { openDrawer('view', activeViewId); } render(); } 
            else { showAlert("Error", "No se pudieron cargar los requerimientos.", "error"); }
        }

        function render(filter = currentFilter) {
            currentFilter = filter; const grid = document.getElementById('reqGrid');
            const filtered = reqsData.filter(r => filter === 'todos' || r.priority === filter);
            if(filtered.length === 0) { grid.innerHTML = '<p class="text-xs text-gray-400 col-span-full py-10">No hay requerimientos en esta categoría.</p>'; return; }

            grid.innerHTML = filtered.map(r => {
                const isCreator = r.created_by === currentUser.id; const canEdit = userRole === 'Administrador' || (isCreator && (userRole === 'Editor' || userRole === 'Manager'));
                const authorName = r.profiles ? r.profiles.full_name : 'Desconocido'; const initials = authorName.substring(0,2).toUpperCase();
                const priorityLabels = { 'critica': 'Crítico', 'alta': 'Alto', 'media': 'Medio', 'baja': 'Bajo' }; const prioLabel = priorityLabels[r.priority] || r.priority;
                const hasFiles = r.files && r.files.length > 0;
                
                const editOptions = canEdit ? `<button onclick="openDrawer('edit', '${r.id}')" class="w-full text-left px-3 py-2 text-xs font-bold hover:bg-gray-50 rounded-lg">Editar</button><button onclick="confirmDel('${r.id}')" class="w-full text-left px-3 py-2 text-xs font-bold text-red-500 hover:bg-red-50 rounded-lg">Eliminar</button>` : '';

                return `
                <div class="apple-card p-6 flex flex-col justify-between relative group">
                    <div>
                        <div class="flex justify-between items-start mb-4"><span class="px-3 py-1 rounded-full text-[9px] font-black uppercase prio-${r.priority}">${prioLabel}</span>${canEdit ? `<div class="relative"><button onclick="toggleDropdown('drop-${r.id}')" class="text-gray-400 hover:text-black transition p-1 bg-gray-50 md:bg-transparent rounded-md md:rounded-none"><i data-lucide="more-horizontal"></i></button><div id="drop-${r.id}" class="apple-dropdown p-2 right-0">${editOptions}</div></div>` : ''}</div>
                        <h3 class="font-bold text-sm leading-relaxed mb-2">${r.title}</h3>
                        ${hasFiles ? `<span class="inline-flex items-center gap-1 text-[10px] font-bold text-blue-500 bg-blue-50 px-2 py-1 rounded-md"><i data-lucide="paperclip" class="w-3 h-3"></i> ${r.files.length} adjuntos</span>` : ''}
                    </div>
                    <div class="mt-6 pt-4 border-t border-gray-50 flex justify-between items-end">
                        <div class="flex items-center gap-2.5"><div class="w-8 h-8 bg-black rounded-full flex items-center justify-center text-white text-[10px] font-bold">${initials}</div><div><p class="text-[10px] font-bold text-gray-800">${authorName}</p><p class="text-[8px] text-gray-400 font-medium">${new Date(r.created_at).toLocaleDateString('es-ES')}</p></div></div>
                        <button onclick="openDrawer('view', '${r.id}')" class="text-[10px] font-bold text-blue-500 hover:underline">Ver detalles</button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
            if(!document.querySelector('.f-btn.active')) { document.querySelector('.f-btn').classList.add('active', 'bg-black', 'text-white'); }
        }

        // --- SISTEMA DE SUBIDA DE ARCHIVOS ---
        function setupDragAndDrop() {
            const dropzone = document.getElementById('fileDropzone'); if(!dropzone) return;
            dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
            dropzone.addEventListener('dragleave', (e) => { e.preventDefault(); dropzone.classList.remove('dragover'); });
            dropzone.addEventListener('drop', (e) => { e.preventDefault(); dropzone.classList.remove('dragover'); if(e.dataTransfer.files && e.dataTransfer.files.length > 0) { uploadFiles(Array.from(e.dataTransfer.files)); } });
        }

        async function uploadFiles(files) {
            const listEl = document.getElementById('fileList');
            for(let f of files) {
                if(f.size > 5 * 1024 * 1024) { showAlert("Archivo muy grande", `El archivo ${f.name} supera los 5MB.`, "info"); continue; }
                const tempId = 'temp-' + Date.now();
                listEl.innerHTML += `<div id="${tempId}" class="flex items-center justify-between bg-gray-50 p-2.5 rounded-lg border border-gray-200"><div class="flex items-center gap-2"><i data-lucide="loader-2" class="w-4 h-4 text-blue-500 animate-spin"></i><span class="text-xs font-medium text-gray-600">Subiendo ${f.name}...</span></div></div>`;
                lucide.createIcons();
                const fileExt = f.name.split('.').pop(); const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`; const filePath = `${currentUser.id}/${fileName}`;
                const { error } = await _supabase.storage.from('archivos_requerimientos').upload(filePath, f);
                document.getElementById(tempId).remove();
                if(error) { showAlert("Error", error.message, "error"); } else { const { data: urlData } = _supabase.storage.from('archivos_requerimientos').getPublicUrl(filePath); currentFiles.push({ name: f.name, url: urlData.publicUrl, path: filePath }); }
            }
            renderUploadUI();
        }

        function renderUploadUI() {
            const listEl = document.getElementById('fileList');
            if(currentFiles.length === 0) { listEl.innerHTML = ''; return; }
            listEl.innerHTML = currentFiles.map((f, index) => `<div class="flex items-center justify-between bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm"><div class="flex items-center gap-2 overflow-hidden"><i data-lucide="file-text" class="w-4 h-4 text-blue-500 shrink-0"></i><a href="${f.url}" target="_blank" class="text-xs font-semibold text-gray-800 hover:underline truncate">${f.name}</a></div><button type="button" onclick="removeFile(${index})" class="text-red-500 hover:bg-red-50 p-1.5 rounded-md transition shrink-0"><i data-lucide="x" class="w-3.5 h-3.5"></i></button></div>`).join('');
            lucide.createIcons();
        }
        async function removeFile(index) { const file = currentFiles[index]; await _supabase.storage.from('archivos_requerimientos').remove([file.path]); currentFiles.splice(index, 1); renderUploadUI(); }

        // --- MANEJO DE SANGRÍAS ---
        function handleTabKey(e) { if (e.key === 'Tab') { e.preventDefault(); indentText(this.id, !e.shiftKey); } }
        function indentText(id, isIncrease) {
            const ta = document.getElementById(id); let start = ta.selectionStart; let end = ta.selectionEnd; let value = ta.value;
            let lineStart = value.lastIndexOf('\n', start - 1) + 1; let lineEnd = value.indexOf('\n', end); if (lineEnd === -1) lineEnd = value.length;
            let selectedLines = value.substring(lineStart, lineEnd); let newText = isIncrease ? selectedLines.replace(/^/gm, '    ') : selectedLines.replace(/^ {1,4}/gm, '');
            ta.value = value.substring(0, lineStart) + newText + value.substring(lineEnd);
            let lengthDiff = newText.length - selectedLines.length; ta.selectionStart = start + (start === lineStart ? 0 : lengthDiff > 0 ? 4 : (lengthDiff < 0 ? -4 : 0)); ta.selectionEnd = end + lengthDiff; ta.focus();
        }

        // --- TABLA DE PROCESOS ---
        function addProcessRow(proceso = '', prio = 'Media', desc = '') {
            const div = document.createElement('div'); div.className = 'flex flex-wrap md:flex-nowrap gap-2 items-start bg-white p-3 rounded-xl border border-gray-100 shadow-sm proc-row relative';
            div.innerHTML = `<div class="w-full md:w-1/3"><label class="text-[8px] font-bold text-gray-400 uppercase md:hidden block mb-1">Proceso</label><input type="text" placeholder="Nombre" value="${proceso}" class="proc-name w-full bg-gray-50 p-2.5 rounded-lg text-xs outline-none focus:ring-1 focus:ring-gray-200 font-semibold"></div><div class="w-full md:w-1/4"><label class="text-[8px] font-bold text-gray-400 uppercase md:hidden block mb-1">Prioridad</label><select class="proc-prio w-full bg-gray-50 p-2.5 rounded-lg text-xs outline-none focus:ring-1 focus:ring-gray-200 font-bold"><option value="Alta" ${prio==='Alta'?'selected':''}>Alta</option><option value="Media" ${prio==='Media'?'selected':''}>Media</option><option value="Baja" ${prio==='Baja'?'selected':''}>Baja</option></select></div><div class="w-full md:flex-1"><label class="text-[8px] font-bold text-gray-400 uppercase md:hidden block mb-1">Descripción</label><input type="text" placeholder="Detalle breve" value="${desc}" class="proc-desc w-full bg-gray-50 p-2.5 rounded-lg text-xs outline-none focus:ring-1 focus:ring-gray-200"></div><button type="button" onclick="this.parentElement.remove()" class="absolute md:relative top-2 right-2 md:top-auto md:right-auto text-red-500 p-2 hover:bg-red-50 rounded-lg transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;
            document.getElementById('processTableBody').appendChild(div); lucide.createIcons();
        }

        // --- DRAWERS ---
        function openDrawer(mode, id = null) {
            activeViewId = id; const titleEl = document.getElementById('drawerTitle'); const contentEl = document.getElementById('drawerContent'); const footerEl = document.getElementById('drawerFooter');
            let r = id ? reqsData.find(x => x.id === id) : null;

            if (mode === 'create' || mode === 'edit') {
                titleEl.innerText = mode === 'create' ? "Nuevo Requerimiento" : "Editar Requerimiento";
                currentFiles = r && r.files ? JSON.parse(JSON.stringify(r.files)) : [];
                const taTemplate = (label, idStr, val) => `<div><div class="flex justify-between items-end mb-1"><label class="text-[10px] font-bold text-gray-400 uppercase ml-1 tracking-widest">${label}</label><div class="flex gap-1 bg-white border border-gray-200 rounded-md p-0.5 shadow-sm"><button type="button" onclick="indentText('${idStr}', false)" class="p-1 text-gray-400 hover:text-black hover:bg-gray-50 rounded transition"><i data-lucide="indent-decrease" class="w-3 h-3"></i></button><button type="button" onclick="indentText('${idStr}', true)" class="p-1 text-gray-400 hover:text-black hover:bg-gray-50 rounded transition"><i data-lucide="indent-increase" class="w-3 h-3"></i></button></div></div><textarea id="${idStr}" oninput="autoExpand(this)" class="w-full bg-gray-50 p-4 rounded-xl border-none outline-none focus:ring-1 focus:ring-gray-200 text-sm min-h-[80px] leading-relaxed">${val}</textarea></div>`;

                contentEl.innerHTML = `
                    <div class="space-y-6">
                        <div><label class="text-[10px] font-bold text-gray-400 uppercase ml-1 tracking-widest">Título Principal</label><input id="reqTitle" type="text" value="${r ? r.title : ''}" class="w-full bg-gray-50 p-4 rounded-xl border-none outline-none focus:ring-1 focus:ring-gray-200 mt-1 font-bold text-sm"></div>
                        ${taTemplate('Objetivo', 'reqObj', r && r.description ? r.description : '')}
                        ${taTemplate('Situación Actual', 'reqActual', r && r.actual_situation ? r.actual_situation : '')}
                        ${taTemplate('Situación Esperada', 'reqEspera', r && r.expected_situation ? r.expected_situation : '')}
                        <div class="pt-4 border-t border-gray-100"><div class="flex justify-between items-center mb-3"><label class="text-[10px] font-bold text-gray-400 uppercase ml-1 tracking-widest">Tabla de Procesos</label><button type="button" onclick="addProcessRow()" class="text-[10px] font-bold text-blue-500 hover:bg-blue-50 px-2 py-1 rounded-md transition">+ Añadir Fila</button></div><div class="hidden md:flex gap-2 px-3 mb-2 text-[9px] font-black text-gray-400 uppercase tracking-widest"><div class="w-1/3">Proceso</div><div class="w-1/4">Prioridad</div><div class="flex-1">Descripción</div></div><div id="processTableBody" class="space-y-3 bg-gray-50 p-3 rounded-xl border border-gray-100 min-h-[80px]"></div></div>
                        <div class="pt-4 border-t border-gray-100"><label class="text-[10px] font-bold text-gray-400 uppercase ml-1 tracking-widest block mb-2">Archivos Adjuntos</label><div id="fileDropzone" class="dropzone rounded-xl p-6 text-center cursor-pointer relative overflow-hidden group" onclick="document.getElementById('fileInput').click()"><input type="file" id="fileInput" class="hidden" multiple onchange="uploadFiles(Array.from(this.files))"><div class="relative z-10 group-hover:scale-105 transition"><i data-lucide="upload-cloud" class="w-8 h-8 text-blue-500 mx-auto mb-2"></i><p class="text-xs text-gray-800 font-bold">Haz clic o arrastra archivos aquí</p><p class="text-[9px] text-gray-400 mt-1 uppercase tracking-widest">PDF, Excel, JPG (Max. 5MB)</p></div></div><div id="fileList" class="mt-3 space-y-2"></div></div>
                        <div><label class="text-[10px] font-bold text-gray-400 uppercase ml-1 tracking-widest">Nivel de Urgencia</label><select id="reqPrio" class="w-full bg-gray-50 p-4 rounded-xl border-none outline-none focus:ring-1 focus:ring-gray-200 mt-1 font-bold text-sm text-gray-700"><option value="critica" ${r && r.priority === 'critica' ? 'selected' : ''}>Crítico</option><option value="alta" ${r && r.priority === 'alta' ? 'selected' : ''}>Alto</option><option value="media" ${r && r.priority === 'media' ? 'selected' : (!r ? 'selected' : '')}>Medio</option><option value="baja" ${r && r.priority === 'baja' ? 'selected' : ''}>Bajo</option></select></div>
                    </div>`;
                
                footerEl.innerHTML = `<div class="flex justify-end gap-3"><button onclick="closeDrawer()" class="px-6 py-2 rounded-full text-xs font-bold text-gray-400 hover:bg-gray-100 transition">Descartar</button><button onclick="saveReq()" class="bg-black text-white px-8 py-2.5 rounded-full text-xs font-bold shadow-lg transition active:scale-95">Guardar Cambios</button></div>`;
                lucide.createIcons(); if (r && r.processes && r.processes.length > 0) { r.processes.forEach(p => addProcessRow(p.proceso, p.prioridad, p.descripcion)); } else if (!r) { addProcessRow(); }
                renderUploadUI(); setupDragAndDrop();
                setTimeout(() => { ['reqObj', 'reqActual', 'reqEspera'].forEach(id => { const el = document.getElementById(id); if(el) { el.addEventListener('keydown', handleTabKey); autoExpand(el); } }); }, 10);

            } else if (mode === 'view') {
                titleEl.innerText = "Detalle del Requerimiento";
                const priorityLabels = { 'critica': 'Crítico', 'alta': 'Alto', 'media': 'Medio', 'baja': 'Bajo' }; const prioLabel = priorityLabels[r.priority] || r.priority;
                let processHtml = '';
                if (r.processes && r.processes.length > 0) {
                    const rows = r.processes.map(p => `<tr class="border-b border-gray-100 last:border-0 hover:bg-gray-50/50 transition"><td class="p-3 font-semibold text-gray-900">${p.proceso}</td><td class="p-3 w-24"><span class="px-2 py-1 rounded-md text-[8px] font-black uppercase tracking-widest prio-${p.prioridad.toLowerCase()}">${p.prioridad}</span></td><td class="p-3 text-gray-600">${p.descripcion}</td></tr>`).join('');
                    processHtml = `<div class="mt-6 pt-6 border-t border-gray-100"><h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Tabla de Procesos</h4><div class="w-full overflow-x-auto rounded-xl border border-gray-200 shadow-sm"><table class="w-full text-left border-collapse min-w-[400px]"><thead><tr class="bg-gray-50 text-[9px] uppercase tracking-widest text-gray-500"><th class="p-3 border-b border-gray-200 font-bold">Proceso</th><th class="p-3 border-b border-gray-200 font-bold">Prioridad</th><th class="p-3 border-b border-gray-200 font-bold">Descripción</th></tr></thead><tbody class="text-xs">${rows}</tbody></table></div></div>`;
                }
                let filesHtml = '';
                if (r.files && r.files.length > 0) {
                    const fBtns = r.files.map(f => `<a href="${f.url}" target="_blank" download class="flex items-center gap-2 px-4 py-3 bg-white border border-gray-200 rounded-xl hover:shadow-md hover:border-blue-300 transition text-xs font-semibold text-gray-800"><i data-lucide="download-cloud" class="w-4 h-4 text-blue-500"></i> <span class="truncate max-w-[150px]">${f.name}</span></a>`).join('');
                    filesHtml = `<div class="mt-6 pt-6 border-t border-gray-100"><h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Documentos Adjuntos</h4><div class="flex flex-wrap gap-3">${fBtns}</div></div>`;
                }
                const commentsList = r.requirement_comments && r.requirement_comments.length > 0 ? 
                    r.requirement_comments.sort((a,b) => new Date(a.created_at) - new Date(b.created_at)).map(c => {
                        const isOwner = c.user_id === currentUser.id;
                        return `<div class="bg-white border border-gray-100 p-4 rounded-xl shadow-sm group relative"><div class="flex justify-between items-start mb-2"><div><span class="text-xs font-bold block">${c.profiles.full_name}</span><span class="text-[9px] text-gray-400 block mt-0.5">${new Date(c.created_at).toLocaleString()}</span></div>${isOwner ? `<div class="opacity-100 md:opacity-0 group-hover:opacity-100 transition flex gap-1 bg-white md:bg-transparent absolute md:relative right-2 top-2 md:right-0 md:top-0 p-1 md:p-0 rounded-md border border-gray-100 md:border-none shadow-sm md:shadow-none"><button onclick="promptEditComment('${c.id}', \`${c.content.replace(/"/g, '&quot;')}\`)" class="p-1.5 text-gray-400 hover:text-blue-500 hover:bg-blue-50 rounded-lg transition"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button><button onclick="promptDeleteComment('${c.id}')" class="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition"><i data-lucide="trash" class="w-3.5 h-3.5"></i></button></div>` : ''}</div><p id="content-comment-${c.id}" class="text-xs text-gray-700 whitespace-pre-wrap leading-relaxed">${highlightMentions(c.content)}</p></div>`;
                    }).join('') : '<p class="text-xs text-gray-400 italic bg-gray-50 p-4 rounded-xl text-center">Aún no hay comentarios en este requerimiento.</p>';

                contentEl.innerHTML = `
                    <div class="space-y-6 pb-6">
                        <div><div class="flex items-center gap-3 mb-3"><span class="px-2.5 py-1 rounded-md text-[8px] font-black uppercase tracking-widest prio-${r.priority} shadow-sm">${prioLabel}</span><span class="text-[10px] font-bold text-gray-400"><i data-lucide="calendar" class="w-3 h-3 inline-block mb-0.5 mr-1"></i>${new Date(r.created_at).toLocaleDateString('es-ES')}</span></div><h3 class="text-2xl font-black tracking-tight text-gray-900 leading-tight">${r.title}</h3></div>
                        <div class="bg-gray-50/50 p-5 rounded-2xl border border-gray-100"><label class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2 flex items-center gap-1.5"><i data-lucide="target" class="w-3.5 h-3.5"></i> Objetivo Principal</label><p class="text-sm text-gray-800 leading-relaxed whitespace-pre-wrap">${r.description || 'Sin objetivo definido.'}</p></div>
                        <div class="space-y-4"><div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm relative overflow-hidden"><div class="absolute top-0 right-0 p-4 opacity-5"><i data-lucide="clock" class="w-12 h-12"></i></div><span class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2 relative z-10">Situación Actual</span><p class="text-xs text-gray-700 font-medium whitespace-pre-wrap leading-relaxed relative z-10">${r.actual_situation || 'N/A'}</p></div><div class="bg-black text-white p-5 rounded-2xl shadow-md relative overflow-hidden"><div class="absolute top-0 right-0 p-4 opacity-10"><i data-lucide="rocket" class="w-12 h-12"></i></div><span class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2 relative z-10">Situación Esperada</span><p class="text-xs text-white/90 font-medium whitespace-pre-wrap leading-relaxed relative z-10">${r.expected_situation || 'N/A'}</p></div></div>
                        ${processHtml}${filesHtml}
                        <div class="pt-8 border-t border-gray-200"><h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 flex items-center gap-1.5"><i data-lucide="message-square" class="w-3.5 h-3.5"></i> Discusión (${r.requirement_comments ? r.requirement_comments.length : 0})</h4><div class="space-y-4">${commentsList}</div></div>
                    </div>`;
                footerEl.innerHTML = `<div class="flex gap-2 w-full relative"><textarea id="newCommentInput" oninput="handleInputMention(event); autoExpand(this);" placeholder="Escribe un comentario... (Usa @Nombre)" class="flex-1 bg-white border border-gray-200 px-4 py-3 rounded-xl text-xs outline-none focus:border-gray-400 focus:ring-2 focus:ring-gray-100 transition shadow-sm" rows="1" style="min-height:45px;"></textarea><button onclick="addComment('${r.id}')" class="bg-black text-white px-5 rounded-xl hover:bg-gray-800 transition self-end h-[45px] flex items-center justify-center shadow-md"><i data-lucide="send" class="w-4 h-4"></i></button></div>`;
            }
            document.getElementById('drawerOverlay').classList.add('active'); document.getElementById('sideDrawer').classList.add('active'); lucide.createIcons(); setTimeout(() => { document.querySelectorAll('textarea').forEach(t => autoExpand(t)); }, 10);
        }

        async function saveReq() {
            const title = document.getElementById('reqTitle').value.trim(); if(!title) return showAlert("Faltan datos", "El título es obligatorio.", "info");
            const processRows = Array.from(document.getElementById('processTableBody').children);
            const processesArr = processRows.map(row => { return { proceso: row.querySelector('.proc-name').value.trim(), prioridad: row.querySelector('.proc-prio').value, descripcion: row.querySelector('.proc-desc').value.trim() }; }).filter(p => p.proceso !== '');
            const payload = { title: title, description: document.getElementById('reqObj').value.trim(), actual_situation: document.getElementById('reqActual').value.trim(), expected_situation: document.getElementById('reqEspera').value.trim(), priority: document.getElementById('reqPrio').value, processes: processesArr, files: currentFiles, created_by: currentUser.id };

            if(activeViewId) { const { error } = await _supabase.from('requirements').update(payload).eq('id', activeViewId); if(error) showAlert("Error", error.message, "error"); else logActivity(`Actualizó el requerimiento: "${title}"`); } 
            else { const { error } = await _supabase.from('requirements').insert([payload]); if(error) showAlert("Error", error.message, "error"); else logActivity(`Creó requerimiento: "${title}"`); }
            closeDrawer(); fetchRequirements();
        }

        function confirmDel(id) { targetDeleteId = id; document.getElementById('deleteModalReq').classList.add('active'); document.querySelectorAll('.apple-dropdown').forEach(d => d.classList.remove('active')); }
        document.getElementById('confirmDeleteReqBtn').onclick = async () => { if(targetDeleteId) { const { error } = await _supabase.from('requirements').delete().eq('id', targetDeleteId); if(!error) { logActivity(`Eliminó un requerimiento.`); targetDeleteId = null; closeModal('deleteModalReq'); fetchRequirements(); } else { showAlert("Error", error.message, "error"); } } };

        // --- COMENTARIOS ---
        async function addComment(reqId) { const input = document.getElementById('newCommentInput'); const txt = input.value.trim(); if(!txt) return; await _supabase.from('requirement_comments').insert([{ requirement_id: reqId, user_id: currentUser.id, content: txt }]); await processMentions(txt, 'requerimiento'); fetchRequirements(); }
        function promptEditComment(cId, text) { document.getElementById('editCommentId').value = cId; document.getElementById('editCommentText').value = text; openModal('editCommentModal'); setTimeout(() => autoExpand(document.getElementById('editCommentText')), 10); }
        async function saveCommentEdit() { const cId = document.getElementById('editCommentId').value; const newText = document.getElementById('editCommentText').value.trim(); if(newText) { await _supabase.from('requirement_comments').update({ content: newText }).eq('id', cId); closeModal('editCommentModal'); fetchRequirements(); } }
        function promptDeleteComment(cId) { document.getElementById('deleteCommentId').value = cId; openModal('deleteCommentModal'); }
        async function confirmDeleteCommentAction() { const cId = document.getElementById('deleteCommentId').value; await _supabase.from('requirement_comments').delete().eq('id', cId); closeModal('deleteCommentModal'); fetchRequirements(); }

        // --- UTILIDADES ---
        function filterBy(val) { document.querySelectorAll('.f-btn').forEach(btn => { btn.classList.remove('active', 'bg-black', 'text-white'); btn.classList.add('bg-white'); }); event.target.classList.add('active', 'bg-black', 'text-white'); event.target.classList.remove('bg-white'); render(val); }
        function autoExpand(t) { t.style.height = 'auto'; t.style.height = (t.scrollHeight) + 'px'; }
        function closeDrawer() { document.getElementById('sideDrawer').classList.remove('active'); document.getElementById('drawerOverlay').classList.remove('active'); activeViewId = null; hideMentionPopup(); }
        
        // Ocultar dropdown de menciones al hacer clic fuera (Específico para requerimientos porque es local)
        document.addEventListener('click', (e) => { if (!e.target.closest('.relative') && !e.target.closest('#mentionPopup')) hideMentionPopup(); });

        // Disparamos el módulo
        runRequirements();
    </script>
</body>
</html>
