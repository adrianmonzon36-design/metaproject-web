<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaProject | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --apple-bg: #F5F5F7; --apple-card: #FFFFFF; }
        * { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--apple-bg); color: #1D1D1F; margin: 0; overflow-x: hidden; }

        /* Estilos Globales Extraídos (Ahora viven en core.js, pero mantenemos los de layout aquí por seguridad) */
        .sidebar { width: 260px; height: 100vh; position: fixed; background: rgba(255,255,255,0.8); backdrop-filter: saturate(180%) blur(20px); border-right: 1px solid rgba(0,0,0,0.08); z-index: 100; transform: translateX(-100%); transition: transform 0.3s ease; }
        @media (min-width: 1024px) { .sidebar { transform: translateX(0); } .main-content { margin-left: 260px; } }
        .sidebar.active { transform: translateX(0); }
        .apple-dropdown { position: absolute; top: 100%; right: 0; margin-top: 8px; background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); width: 240px; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s ease; z-index: 200; }
        .apple-dropdown.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1200; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 28px; padding: 32px; position: relative; }

        /* Estilos del Dashboard */
        .apple-card { background: var(--apple-card); border-radius: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); border: 1px solid transparent; }
        .card-dark { background: #000000; color: #FFFFFF; border-radius: 24px; }
        .gantt-track { background: #E8E8ED; height: 6px; border-radius: 10px; overflow: hidden; }
        .gantt-fill { background: #1D1D1F; height: 100%; border-radius: 10px; transition: width 1s ease; }
        textarea { resize: none; overflow: hidden; min-height: 40px; }
        #mentionPopup { position: absolute; background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); width: 240px; max-height: 200px; overflow-y: auto; z-index: 9999; display: none; }
        #mentionPopup.active { display: block; }
    </style>
</head>
<body>
    
    <script src="core.js"></script>

    <div id="mentionPopup"></div>
    
    <div id="editModal" class="modal-overlay">
        <div class="modal-content relative">
            <button onclick="closeModal('editModal')" class="absolute top-6 right-6 text-gray-400 hover:text-black transition"><i data-lucide="x" class="w-5 h-5"></i></button>
            <h3 class="text-xl font-bold mb-6 tracking-tight">Editar publicación</h3>
            <textarea id="editModalInput" oninput="autoResize(this)" class="w-full text-sm outline-none bg-gray-50 p-4 rounded-xl focus:ring-1 focus:ring-gray-200 mb-6 font-medium"></textarea>
            <div class="flex justify-end gap-3">
                <button onclick="closeModal('editModal')" class="px-6 py-2.5 rounded-full text-xs font-bold text-gray-400 hover:bg-gray-100 transition">Descartar</button>
                <button id="saveEditBtn" class="bg-black text-white px-8 py-2.5 rounded-full text-xs font-bold shadow-lg active:scale-95 transition">Guardar</button>
            </div>
        </div>
    </div>

    <div id="deleteModalDash" class="modal-overlay">
        <div class="modal-content max-w-xs text-center p-8 relative">
            <button onclick="closeModal('deleteModalDash')" class="absolute top-4 right-4 text-gray-400 hover:text-black transition"><i data-lucide="x" class="w-5 h-5"></i></button>
            <div class="w-12 h-12 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="alert-triangle"></i></div>
            <h3 class="text-lg font-bold mb-2">¿Estás seguro?</h3>
            <p class="text-xs text-gray-500 mb-8 font-medium">Esta acción no se puede deshacer.</p>
            <div class="flex flex-col gap-2">
                <button id="confirmDeleteBtn" class="w-full bg-red-500 text-white py-3 rounded-xl text-xs font-bold active:scale-95 transition">Continuar</button>
                <button onclick="closeModal('deleteModalDash')" class="w-full py-3 rounded-xl text-xs font-bold text-gray-500 hover:bg-gray-100 transition">Descartar</button>
            </div>
        </div>
    </div>

    <main class="main-content">
        <div class="p-6 lg:p-10 max-w-7xl mx-auto space-y-10">
            <section>
                <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-4">Resumen de Proyecto</h2>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-6">
                    <div class="apple-card p-6 flex flex-col items-center justify-center col-span-2 lg:col-span-1">
                        <div class="w-14 h-14 relative mb-2"><canvas id="mainProgressChart"></canvas><div class="absolute inset-0 flex items-center justify-center text-xs font-bold" id="mainProgressText">0%</div></div>
                        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Avance Global</span>
                    </div>
                    <div class="apple-card p-6 flex flex-col justify-center">
                        <p class="text-[10px] text-green-500 font-bold uppercase tracking-widest mb-1">Completadas</p>
                        <p class="text-4xl font-bold tracking-tight text-gray-900" id="kpiCompletadas">0</p>
                    </div>
                    <div class="apple-card p-6 flex flex-col justify-center">
                        <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest mb-1">En proceso</p>
                        <p class="text-4xl font-bold text-blue-600 tracking-tight" id="kpiProceso">0</p>
                    </div>
                    <div class="apple-card p-6 flex flex-col justify-center">
                        <p class="text-[10px] text-rose-500 font-bold uppercase tracking-widest mb-1">En atraso</p>
                        <p class="text-4xl font-bold text-rose-500 tracking-tight" id="kpiAtrasadas">0</p>
                    </div>
                </div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-5 space-y-6">
                    <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Hitos & Roadmap</h2>
                    <div class="apple-card p-8">
                        <div id="hitosRoot" class="space-y-6"><p class="text-xs text-gray-400 text-center animate-pulse">Cargando progreso...</p></div>
                    </div>
                    <div class="card-dark p-6 shadow-xl" id="nextLaunchCard"></div>
                </div>

                <div class="lg:col-span-7 space-y-6">
                    <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Muro de Actualizaciones</h2>
                    <div class="apple-card p-6 relative">
                        <div class="flex gap-4">
                            <div class="w-8 h-8 bg-black rounded-full flex shrink-0 items-center justify-center font-bold text-white text-[10px]" id="wallAvatar">--</div>
                            <div class="flex-1">
                                <textarea id="postTxt" oninput="handleInputMention(event); autoResize(this)" placeholder="Cuéntanos en qué estás trabajando... (Usa @Nombre para mencionar)" class="w-full text-sm outline-none resize-none bg-gray-50 hover:bg-gray-100 focus:bg-white focus:ring-1 focus:ring-gray-200 transition p-4 rounded-xl font-medium"></textarea>
                                <div class="flex justify-end mt-3"><button onclick="publish()" class="bg-black text-white px-8 py-2.5 rounded-full text-[11px] font-bold shadow-lg active:scale-95 transition">Publicar</button></div>
                            </div>
                        </div>
                    </div>
                    <div id="feed" class="space-y-4"><p class="text-xs text-gray-400 text-center py-6 animate-pulse">Cargando actualizaciones...</p></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let chartInstance = null; let currentTargetId = null; let currentType = null; let postsData = []; let activeMentionInput = null;
        const TODAY_DASH = new Date(); TODAY_DASH.setHours(0,0,0,0);

        // --- ARRANQUE PRINCIPAL ---
        async function runDashboard() {
            const isLogged = await initCore(); 
            if(isLogged) {
                document.getElementById('wallAvatar').innerText = currentUserName.substring(0,2).toUpperCase();
                lucide.createIcons();
                loadDashboardData();
                fetchPosts();
            }
        }
        
        function autoResize(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }

        function parseDate(dateStr) { if(!dateStr) return new Date(); const [y, m, d] = dateStr.split('-'); return new Date(y, m - 1, d); }
        function formatDate(dateString) { if(!dateString) return '--'; const [y, m, d] = dateString.split('-'); const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic']; return `${d} ${months[parseInt(m)-1]}`; }

        async function loadDashboardData() {
            const { data: hitosData } = await _supabase.from('milestones').select('*, tasks(*)').order('target_date', { ascending: true });
            if (!hitosData) return;

            let totalTasks = 0; let completedTasks = 0; let inProcessTasks = 0; let delayedTasks = 0; let firstIncompleteHito = null;

            const hitosHtml = hitosData.map(h => {
                let hTotal = h.tasks ? h.tasks.length : 0; let hCompleted = 0;
                if (h.tasks) {
                    h.tasks.forEach(t => {
                        totalTasks++;
                        if (t.status === 'completado') { hCompleted++; completedTasks++; } 
                        else {
                            if (t.status === 'proceso') inProcessTasks++;
                            if (t.end_date) { const diffDays = Math.ceil((parseDate(t.end_date) - TODAY_DASH) / (1000 * 60 * 60 * 24)); if (diffDays < 0) delayedTasks++; }
                        }
                    });
                }
                let hProgress = hTotal === 0 ? 0 : Math.round((hCompleted / hTotal) * 100);
                if (hProgress < 100 && !firstIncompleteHito) firstIncompleteHito = h;

                return `<div class="space-y-2"><div class="flex justify-between items-end"><span class="text-sm font-bold text-gray-900">${h.title}</span><span class="text-[10px] font-black text-gray-400">${hProgress}%</span></div><div class="gantt-track"><div class="gantt-fill ${hProgress === 100 ? 'bg-green-500' : 'bg-black'}" style="width: ${hProgress}%"></div></div></div>`;
            }).join('');

            document.getElementById('hitosRoot').innerHTML = hitosHtml || '<p class="text-xs text-gray-400 text-center">No hay hitos creados.</p>';
            document.getElementById('kpiCompletadas').innerText = completedTasks; document.getElementById('kpiProceso').innerText = inProcessTasks; document.getElementById('kpiAtrasadas').innerText = delayedTasks;
            
            const totalProgress = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);
            document.getElementById('mainProgressText').innerText = totalProgress + '%';

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(document.getElementById('mainProgressChart'), { type: 'doughnut', data: { datasets: [{ data: [totalProgress, 100 - totalProgress], backgroundColor: ['#000', '#F2F2F7'], borderWidth: 0 }] }, options: { cutout: '82%', plugins: { legend: { display: false }, tooltip: { enabled: false } }, responsive: true, maintainAspectRatio: true } });

            const nextLaunchContainer = document.getElementById('nextLaunchCard');
            if (firstIncompleteHito) {
                nextLaunchContainer.innerHTML = `<div class="flex items-center gap-2 mb-2"><i data-lucide="zap" class="w-3.5 h-3.5 text-yellow-400"></i><p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Próximo Lanzamiento</p></div><h4 class="text-lg font-bold leading-tight">${firstIncompleteHito.title}</h4><div class="mt-4 pt-4 border-t border-gray-800"><span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Fecha Estimada: <span class="text-white">${formatDate(firstIncompleteHito.target_date)}</span></span></div>`;
            } else {
                nextLaunchContainer.innerHTML = `<div class="text-center py-4"><i data-lucide="check-circle" class="w-8 h-8 text-green-500 mx-auto mb-2"></i><p class="text-sm font-bold text-white">Todos los hitos completados 🎉</p></div>`;
            }
            lucide.createIcons();
        }

        async function processMentions(text, locationType) {
            const mentions = [];
            allUsers.forEach(u => { if (u.id !== currentUser.id && text.includes(`@${u.full_name}`)) { mentions.push({ user_id: u.id, title: currentUserName, message: `te mencionó en un ${locationType}.` }); } });
            if (mentions.length > 0) await _supabase.from('notifications').insert(mentions);
        }

        // --- AUTOCOMPLETADO MENCIONES ---
        function handleInputMention(e) {
            const input = e.target; const val = input.value; const cursor = input.selectionStart;
            const textBeforeCursor = val.substring(0, cursor); const lastAtSignIndex = textBeforeCursor.lastIndexOf('@');
            if (lastAtSignIndex !== -1) { const textAfterAt = textBeforeCursor.substring(lastAtSignIndex + 1); if (!textAfterAt.includes(' ')) { activeMentionInput = input; showMentionPopup(input, textAfterAt.toLowerCase()); return; } }
            hideMentionPopup();
        }

        function showMentionPopup(input, query) {
            const popup = document.getElementById('mentionPopup');
            const matches = allUsers.filter(u => u.full_name.toLowerCase().includes(query) && u.id !== currentUser.id);
            if (matches.length === 0) { hideMentionPopup(); return; }
            popup.innerHTML = matches.map(u => `<div class="px-4 py-3 border-b border-gray-50 hover:bg-gray-50 cursor-pointer flex items-center gap-3 transition" onclick="selectMention('${u.full_name}')"><div class="w-6 h-6 bg-black rounded-full text-white text-[8px] font-bold flex items-center justify-center shrink-0">${u.full_name.substring(0,2).toUpperCase()}</div><span class="text-xs font-bold text-gray-800">${u.full_name}</span></div>`).join('');
            const rect = input.getBoundingClientRect(); popup.style.top = (rect.bottom + window.scrollY + 5) + 'px'; popup.style.left = rect.left + 'px'; popup.style.width = Math.min(rect.width, 300) + 'px'; popup.classList.add('active');
        }

        function selectMention(fullName) {
            if (!activeMentionInput) return;
            const val = activeMentionInput.value; const cursor = activeMentionInput.selectionStart;
            const textBeforeCursor = val.substring(0, cursor); const textAfterCursor = val.substring(cursor);
            const lastAtSignIndex = textBeforeCursor.lastIndexOf('@'); const newTextBeforeCursor = textBeforeCursor.substring(0, lastAtSignIndex) + `@${fullName} `;
            activeMentionInput.value = newTextBeforeCursor + textAfterCursor; activeMentionInput.focus();
            activeMentionInput.selectionStart = activeMentionInput.selectionEnd = newTextBeforeCursor.length; hideMentionPopup();
        }

        function hideMentionPopup() { const popup = document.getElementById('mentionPopup'); if (popup) popup.classList.remove('active'); activeMentionInput = null; }
        function highlightMentions(text) { let formatted = text; allUsers.forEach(u => { const regex = new RegExp(`@${u.full_name}`, 'g'); formatted = formatted.replace(regex, `<span class="text-blue-500 font-bold bg-blue-50 px-1 rounded">@${u.full_name}</span>`); }); return formatted; }

        // --- MURO ---
        async function fetchPosts() { const { data } = await _supabase.from('posts').select('*, profiles(full_name), comments(*, profiles(full_name)), post_likes(user_id)').order('created_at', { ascending: false }); postsData = data || []; renderPosts(); }
        async function toggleLike(postId, btn) {
            const isLiked = btn.getAttribute('data-liked') === 'true'; const counter = btn.querySelector('.like-counter'); let count = parseInt(counter.innerText) || 0;
            if (isLiked) { btn.classList.remove('text-red-500'); btn.classList.add('text-gray-400'); btn.setAttribute('data-liked', 'false'); counter.innerText = count - 1; await _supabase.from('post_likes').delete().match({ post_id: postId, user_id: currentUser.id }); } 
            else { btn.classList.remove('text-gray-400'); btn.classList.add('text-red-500'); btn.setAttribute('data-liked', 'true'); counter.innerText = count + 1; await _supabase.from('post_likes').insert([{ post_id: postId, user_id: currentUser.id }]); }
        }

        function renderPosts() {
            const container = document.getElementById('feed');
            if(postsData.length === 0) { container.innerHTML = '<p class="text-xs text-gray-400 text-center py-10">Sé el primero en publicar una actualización.</p>'; return; }
            container.innerHTML = postsData.map(p => {
                const authorName = p.profiles ? p.profiles.full_name : 'Desconocido'; const initials = authorName.substring(0,2).toUpperCase(); const isOwner = p.user_id === currentUser.id;
                const commentsCount = p.comments ? p.comments.length : 0; const likesCount = p.post_likes ? p.post_likes.length : 0; const isLikedByMe = p.post_likes && p.post_likes.some(l => l.user_id === currentUser.id);
                const commentsHtml = p.comments.sort((a,b) => new Date(a.created_at) - new Date(b.created_at)).map(c => {
                    const cAuthor = c.profiles ? c.profiles.full_name : 'Anónimo'; const cInitials = cAuthor.substring(0,2).toUpperCase(); const cIsOwner = c.user_id === currentUser.id;
                    return `<div id="comment-${c.id}" class="flex flex-col bg-gray-50 p-4 rounded-xl relative group mt-3"><div class="flex justify-between items-start"><div class="flex gap-3"><div class="w-6 h-6 bg-black rounded-full shrink-0 flex items-center justify-center text-white text-[8px] font-bold">${cInitials}</div><div><span class="text-[10px] font-bold text-gray-900 block mb-0.5">${cAuthor}</span><p id="content-comment-${c.id}" class="text-xs text-gray-700 font-medium pr-8 whitespace-pre-wrap leading-relaxed">${highlightMentions(c.content)}</p></div></div>${cIsOwner ? `<div class="flex gap-1 opacity-100 md:opacity-0 group-hover:opacity-100 transition absolute right-2 top-2 bg-gray-50 md:p-0 p-1 rounded-md shadow-sm md:shadow-none border border-gray-200 md:border-transparent"><button onclick="triggerEdit('${c.id}', 'comment')" class="text-gray-400 hover:text-blue-500 p-1.5 rounded-md hover:bg-white transition"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i></button><button onclick="triggerDelete('${c.id}', 'comment')" class="text-gray-400 hover:text-red-500 p-1.5 rounded-md hover:bg-white transition"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button></div>` : ''}</div></div>`;
                }).join('');
                return `<div id="post-${p.id}" class="apple-card p-6 animate-in fade-in zoom-in duration-300"><div class="flex justify-between items-start mb-4 relative"><div class="flex items-center gap-3"><div class="w-8 h-8 bg-black rounded-full text-white text-[10px] font-bold flex items-center justify-center">${initials}</div><div><span class="text-xs font-bold block">${authorName}</span><span class="text-[9px] text-gray-400 font-medium">${new Date(p.created_at).toLocaleString('es-ES', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span></div></div>${isOwner ? `<div class="relative"><button onclick="toggleDropdown('m-${p.id}')" class="text-gray-400 hover:text-black p-2 bg-gray-50 md:bg-transparent rounded-lg md:rounded-none"><i data-lucide="more-horizontal" class="w-4 h-4"></i></button><div id="m-${p.id}" class="apple-dropdown p-2 w-32 right-0"><button onclick="triggerEdit('${p.id}', 'post')" class="w-full text-left px-3 py-2 text-xs font-bold hover:bg-gray-50 rounded-lg">Editar</button><button onclick="triggerDelete('${p.id}', 'post')" class="w-full text-left px-3 py-2 text-xs font-bold text-red-500 hover:bg-red-50 rounded-lg">Eliminar</button></div></div>` : ''}</div><div class="hidden" id="raw-content-post-${p.id}">${p.content}</div><p class="text-sm text-gray-700 font-medium leading-relaxed mb-4 whitespace-pre-wrap">${highlightMentions(p.content)}</p><div class="flex gap-5 pt-4 border-t border-gray-50"><button onclick="toggleLike('${p.id}', this)" data-liked="${isLikedByMe}" class="text-[10px] font-bold ${isLikedByMe ? 'text-red-500' : 'text-gray-400'} hover:text-red-500 flex items-center gap-1.5 transition"><i data-lucide="heart" class="w-4 h-4"></i> <span class="like-counter">${likesCount}</span> Me gusta</button><button onclick="document.getElementById('cs-${p.id}').classList.toggle('hidden')" class="text-[10px] font-bold text-gray-400 hover:text-blue-500 flex items-center gap-1.5 transition"><i data-lucide="message-circle" class="w-4 h-4"></i> ${commentsCount} Comentarios</button></div><div id="cs-${p.id}" class="hidden mt-4 pt-4 border-t border-gray-50"><div id="list-${p.id}" class="mb-4">${commentsHtml}</div><div class="flex gap-3 relative"><input type="text" id="in-${p.id}" oninput="handleInputMention(event)" placeholder="Usa @Nombre para mencionar a alguien..." class="flex-1 bg-gray-50 px-4 py-2.5 rounded-xl text-xs outline-none focus:ring-1 focus:ring-gray-200 font-medium"><button onclick="addComment('${p.id}')" class="bg-black text-white p-2.5 rounded-xl hover:scale-105 transition"><i data-lucide="send" class="w-4 h-4"></i></button></div></div></div>`;
            }).join('');
            lucide.createIcons();
        }

        async function publish() { const input = document.getElementById('postTxt'); const content = input.value.trim(); if(!content) return; const { error } = await _supabase.from('posts').insert([{ user_id: currentUser.id, content }]); if(!error) { input.value = ''; input.style.height = '40px'; await processMentions(content, 'publicación'); fetchPosts(); } }
        async function addComment(postId) { const input = document.getElementById(`in-${postId}`); const content = input.value.trim(); if(!content) return; await _supabase.from('comments').insert([{ post_id: postId, user_id: currentUser.id, content }]); await processMentions(content, 'comentario'); input.value = ''; fetchPosts(); }
        function triggerEdit(id, type) { currentTargetId = id; currentType = type; const oldText = type === 'post' ? document.getElementById(`raw-content-post-${id}`).innerText : document.getElementById(`content-comment-${id}`).innerText; const editInput = document.getElementById('editModalInput'); editInput.value = oldText; openModal('editModal'); setTimeout(()=>autoResize(editInput),10); }
        function triggerDelete(id, type) { currentTargetId = id; currentType = type; openModal('deleteModalDash'); }

        document.getElementById('saveEditBtn').onclick = async () => { const newText = document.getElementById('editModalInput').value.trim(); if(newText) { const table = currentType === 'post' ? 'posts' : 'comments'; await _supabase.from(table).update({ content: newText }).eq('id', currentTargetId); closeModal('editModal'); fetchPosts(); } };
        document.getElementById('confirmDeleteBtn').onclick = async () => { const table = currentType === 'post' ? 'posts' : 'comments'; await _supabase.from(table).delete().eq('id', currentTargetId); closeModal('deleteModalDash'); fetchPosts(); };

        // Cerramos popups si damos clic afuera
        document.addEventListener('click', (e) => { if (!e.target.closest('.relative') && !e.target.closest('#mentionPopup')) { hideMentionPopup(); } });

        // Disparamos el Dashboard
        runDashboard();
    </script>
</body>
</html>
